services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [redis]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
  worker:
    build: ./backend
    env_file: .env
    depends_on: [redis]
    command: celery -A worker worker --loglevel=info